  border: 1px solid light-dark(var(--primary-foreground), var(--foreground));
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;style&gt;
  #medo-outreach-board {
    --soft-yellow: color-mix(in srgb, var(--viz-series-4) 48%, var(--card));
    --soft-pink: color-mix(in srgb, var(--viz-series-2) 36%, var(--card));
    --soft-green: color-mix(in srgb, var(--viz-series-3) 38%, var(--card));
    --soft-blue: color-mix(in srgb, var(--viz-series-1) 30%, var(--card));
    color: var(--foreground);
    background: color-mix(in srgb, var(--background) 92%, var(--viz-series-4) 8%);
    border: 1px solid var(--border);
    border-radius: 28px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 150px minmax(0, 1fr);
    height: 100vh;
    min-height: 0;
  }
  #medo-outreach-board * { box-sizing: border-box; }
  #medo-outreach-board .side-rail {
    background: var(--foreground);
    color: var(--background);
    padding: 28px 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 34px;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  #medo-outreach-board .brand { font-size: 24px; font-weight: 500; letter-spacing: -1px; padding: 0 8px; }
  #medo-outreach-board .brand span { color: color-mix(in srgb, var(--viz-series-2) 72%, var(--background)); }
  #medo-outreach-board nav { display: grid; gap: 8px; }
  #medo-outreach-board .nav-item {
    appearance: none; border: 0; background: transparent; color: color-mix(in srgb, var(--background) 65%, transparent);
    font: inherit; text-align: left; padding: 10px 8px; border-radius: 10px; display: flex; gap: 9px; align-items: center; cursor: pointer;
  }
  #medo-outreach-board .nav-item.active { background: color-mix(in srgb, var(--background) 13%, transparent); color: var(--background); }
  #medo-outreach-board .nav-item span { width: 18px; text-align: center; }
  #medo-outreach-board .owner-switcher { display: grid; gap: 7px; padding: 2px 0; }
  #medo-outreach-board .owner-tab {
    appearance: none; border: 0; border-radius: 14px; background: color-mix(in srgb, var(--background) 7%, transparent);
    color: color-mix(in srgb, var(--background) 70%, transparent); padding: 8px; display: grid; grid-template-columns: 28px minmax(0,1fr);
    gap: 8px; align-items: center; text-align: left; font: inherit; cursor: pointer;
  }
  #medo-outreach-board .owner-tab strong { width: 28px; height: 28px; border-radius: 10px; display: grid; place-items: center; background: color-mix(in srgb, var(--background) 10%, transparent); color: var(--background); font-weight: 500; font-size: 12px; }
  #medo-outreach-board .owner-tab span { min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #medo-outreach-board .owner-tab.active { background: var(--background); color: var(--foreground); }
  #medo-outreach-board .owner-tab.active strong { background: var(--foreground); color: var(--background); }
  #medo-outreach-board .owner-tab:hover { opacity: .86; }
  #medo-outreach-board .rail-meta { margin-top: auto; display: grid; gap: 6px; padding: 12px 8px; font-size: 12px; color: color-mix(in srgb, var(--background) 64%, transparent); }
  #medo-outreach-board .rail-meta strong { color: var(--background); font-weight: 500; }
  #medo-outreach-board .rail-label { font-size: 10px; letter-spacing: 1.2px; }
  #medo-outreach-board .board-main { padding: 22px 24px 28px; min-width: 0; height: 100vh; overflow-y: auto; }
  #medo-outreach-board .topline, #medo-outreach-board .intro-row, #medo-outreach-board .section-heading { display: flex; align-items: center; justify-content: space-between; gap: 18px; }
  #medo-outreach-board .search-wrap { position: relative; display: flex; align-items: center; flex: 1; max-width: 560px; }
  #medo-outreach-board .search-wrap &gt; span { position: absolute; left: 13px; z-index: 1; color: var(--muted-foreground); }
  #medo-outreach-board .search-wrap input { padding-left: 36px; background: color-mix(in srgb, var(--card) 76%, transparent); }
  #medo-outreach-board .top-actions { display: flex; align-items: center; gap: 10px; }
  #medo-outreach-board .sync-status { display: inline-flex; align-items: center; min-height: 30px; border-radius: 999px; padding: 0 10px; background: color-mix(in srgb, var(--secondary) 72%, transparent); color: var(--muted-foreground); border: 1px solid color-mix(in srgb, var(--border) 62%, transparent); font-size: 12px; white-space: nowrap; }
  #medo-outreach-board .sync-status.is-live { color: var(--foreground); background: color-mix(in srgb, var(--accent) 72%, transparent); }
  #medo-outreach-board .sync-status.is-error { color: var(--destructive); background: color-mix(in srgb, var(--destructive) 10%, transparent); }
  #medo-outreach-board .top-command { appearance: none; border: 0; border-radius: 999px; background: transparent; color: var(--foreground); padding: 8px 11px; display: inline-flex; align-items: center; gap: 7px; font: inherit; font-weight: 500; cursor: pointer; }
  #medo-outreach-board .top-command svg { width: 15px; height: 15px; }
  #medo-outreach-board .top-command-quiet { color: var(--muted-foreground); }
  #medo-outreach-board .top-command-quiet:hover { background: var(--muted); color: var(--foreground); }
  #medo-outreach-board .top-command-primary { background: var(--foreground); color: var(--background); }
  #medo-outreach-board .top-command-primary:hover { opacity: .82; }
  #medo-outreach-board .date-chip { font-size: 11px; letter-spacing: .8px; color: var(--muted-foreground); }

  const sheetSource = {
    baseUrl: &#x27;https://docs.google.com/spreadsheets/d/10w862WH-iBleMRqv-CWol7pzKU9q6r1FPBk6A85VpNU/gviz/tq&#x27;,

    range: &#x27;A1:H200&#x27;
  };

  function gvizCellValue(cell) {
    if (!cell) return &#x27;&#x27;;
    return String(cell.f ?? cell.v ?? &#x27;&#x27;).trim();
  }

  function rowsFromGvizTable(response) {
    const rawRows = response?.table?.rows || [];
    const values = rawRows.map(row =&gt; (row.c || []).map(gvizCellValue));
    const header = values.shift() || [];
    return values.map(row =&gt; Object.fromEntries(header.map((name, index) =&gt; [name, row[index] || &#x27;&#x27;])))
      .filter(row =&gt; row[&#x27;对接人&#x27;] || row[&#x27;平台/商家名&#x27;] || row[&#x27;官网链接&#x27;] || row[&#x27;联系方式&#x27;]);
  }

  function loadSheetRows() {
    return new Promise((resolve, reject) =&gt; {
      const callbackName = `__medoSheetCallback_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
      const script = document.createElement(&#x27;script&#x27;);
      const params = new URLSearchParams({
        tqx: `responseHandler:${callbackName};out:json`,
        gid: sheetSource.gid,
        range: sheetSource.range,
        _: String(Date.now())
      });
      const cleanup = () =&gt; {
        delete window[callbackName];
        script.remove();
      };
      const timer = setTimeout(() =&gt; {
        cleanup();
        reject(new Error(&#x27;Google Sheet 加载超时&#x27;));
      }, 12000);
      window[callbackName] = response =&gt; {
        clearTimeout(timer);
        cleanup();
        if (response?.status &amp;&amp; response.status !== &#x27;ok&#x27;) {
          reject(new Error(response.errors?.[0]?.detailed_message || &#x27;Google Sheet 返回错误&#x27;));
          return;
        }
        resolve(rowsFromGvizTable(response));
      };
      script.onerror = () =&gt; {
        clearTimeout(timer);
        cleanup();
        reject(new Error(&#x27;无法加载 Google Sheet&#x27;));
      };
      script.src = `${sheetSource.baseUrl}?${params.toString()}`;
      document.head.appendChild(script);
    });

      if (window.lucide?.createIcons) lucide.createIcons({ attrs: { width: 16, height: 16 } });
    }, 1200);
  }

  function copyText(value, button) {
    const done = () =&gt; setButtonText(button, &#x27;已复制&#x27;);
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(value).then(done).catch(() =&gt; fallbackCopy(value, button));
    } else {
      fallbackCopy(value, button);
    }
  }

  function emailBodyHtmlForClipboard(value) {
    return `&lt;div&gt;${esc(value).replace(/\bMeDo\b/, &#x27;&lt;a href=&quot;https://medo.dev/&quot;&gt;MeDo&lt;/a&gt;&#x27;).replace(/\n/g, &#x27;&lt;br&gt;&#x27;)}&lt;/div&gt;`;
  }

  function copyEmailBody(value, button) {
    const done = () =&gt; setButtonText(button, &#x27;已复制&#x27;);
    if (navigator.clipboard?.write &amp;&amp; window.ClipboardItem) {
      const item = new ClipboardItem({
        &#x27;text/html&#x27;: new Blob([emailBodyHtmlForClipboard(value)], {type: &#x27;text/html&#x27;}),
        &#x27;text/plain&#x27;: new Blob([value], {type: &#x27;text/plain&#x27;})
      });
      navigator.clipboard.write([item]).then(done).catch(() =&gt; copyText(value, button));
    } else {
      copyText(value, button);
    }
  }

  function fallbackCopy(value, button) {
    const area = document.createElement(&#x27;textarea&#x27;);
    area.value = value;
    area.setAttribute(&#x27;readonly&#x27;, &#x27;&#x27;);
    area.style.position = &#x27;fixed&#x27;;
    area.style.opacity = &#x27;0&#x27;;
    document.body.appendChild(area);
    area.select();
    document.execCommand(&#x27;copy&#x27;);
    area.remove();
    setButtonText(button, &#x27;已复制&#x27;);
  }

  function persist() {
    localStorage.setItem(storageKey, JSON.stringify(targets));
  }

  function todayIsoDate() {
    const parts = new Intl.DateTimeFormat(&#x27;en&#x27;, {timeZone:&#x27;Asia/Shanghai&#x27;, year:&#x27;numeric&#x27;, month:&#x27;2-digit&#x27;, day:&#x27;2-digit&#x27;}).formatToParts(new Date());
    const map = Object.fromEntries(parts.map(part =&gt; [part.type, part.value]));
    return `${map.year}-${map.month}-${map.day}`;
  }

  function ensureFollowupDate(target) {
    if (target.followup) return;
    const [year, month, day] = String(target.firstsent || todayIsoDate()).split(&#x27;-&#x27;).map(Number);
    const date = new Date(Date.UTC(year, month - 1, day));
    date.setUTCDate(date.getUTCDate() + 4);
    target.followup = date.toISOString().slice(0, 10);
  }

  function markTargetSent(target) {
    if (!target) return;
    target.status = &#x27;sent&#x27;;
    target.firstsent = target.firstsent || todayIsoDate();
    ensureFollowupDate(target);
    selectTarget(target);
    persist();
    render();
  }

      detailMarkSent.classList.toggle(&#x27;detail-command-sent&#x27;, isSent);
      detailMarkSent.classList.toggle(&#x27;detail-command-replied&#x27;, target.status === &#x27;replied&#x27;);

    root.querySelectorAll(&#x27;.template-item&#x27;).forEach(item =&gt; item.setAttribute(&#x27;aria-pressed&#x27;, String(item.dataset.key === targetKey(target))));

  function cardFor(target) {

  function channelRowFor(target) {
    const row = document.createElement(&#x27;article&#x27;);
    row.className = `channel-row ${statusClassFor(target)}`;
    row.dataset.key = targetKey(target);

      &lt;span class=&quot;viz-badge&quot;&gt;${esc(typeLabelFor(typeKeyFor(target)))}&lt;/span&gt;
      &lt;span class=&quot;channel-meta&quot;&gt;${esc(target.priority)} 级 · ${esc(regionLabelFor(target))} · ${esc(formatDate(sourcedDateFor(target)))}&lt;/span&gt;

        ${hasEmailTemplate(target) ? &#x27;&lt;button class=&quot;mini-command row-email&quot; type=&quot;button&quot;&gt;邮件&lt;/button&gt;&#x27; : &#x27;&#x27;}

    row.querySelector(&#x27;.row-select&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; selectTarget(target));
    row.querySelector(&#x27;.row-email&#x27;)?.addEventListener(&#x27;click&#x27;, () =&gt; {
      selectTarget(target);

  function templateItemFor(target) {
    const button = document.createElement(&#x27;button&#x27;);
    button.type = &#x27;button&#x27;;
    button.className = `template-item ${statusClassFor(target)}`;
    button.dataset.key = targetKey(target);

    button.innerHTML = `&lt;strong&gt;${esc(target.name)}&lt;/strong&gt;&lt;small&gt;${esc(emailSubjectFor(target))}&lt;/small&gt;&lt;small&gt;${esc(target.email || target.contact)}&lt;/small&gt;`;
    button.addEventListener(&#x27;click&#x27;, () =&gt; selectTarget(target));
    return button;
  }

  function followupItemFor(target) {
    const item = document.createElement(&#x27;article&#x27;);
    const bucket = followupBucket(target);
    item.className = `followup-item status-${bucket}`;
    const statusText = bucket === &#x27;todo&#x27; ? &#x27;待发送&#x27; : bucket === &#x27;sent&#x27; ? &#x27;已发送 · 待跟进&#x27; : &#x27;已回复&#x27;;
    const nextDate = target.followup || (bucket === &#x27;todo&#x27; ? &#x27;尚未发送&#x27; : &#x27;待设定跟进日期&#x27;);
    const primaryAction = bucket === &#x27;todo&#x27; ? &#x27;标记已发送&#x27; : bucket === &#x27;sent&#x27; ? &#x27;标记已回复&#x27; : &#x27;重新跟进&#x27;;
    item.innerHTML = `
      &lt;div class=&quot;followup-main&quot;&gt;
        &lt;div class=&quot;followup-titleline&quot;&gt;&lt;strong&gt;${esc(target.name)}&lt;/strong&gt;&lt;span class=&quot;followup-pill&quot;&gt;${esc(statusText)}&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;followup-facts&quot;&gt;
          &lt;span class=&quot;followup-fact&quot;&gt;&lt;span&gt;下次跟进&lt;/span&gt;&lt;b&gt;${esc(nextDate)}&lt;/b&gt;&lt;/span&gt;
          &lt;span class=&quot;followup-fact&quot;&gt;&lt;span&gt;邮箱&lt;/span&gt;&lt;b&gt;${esc(target.email || target.contact)}&lt;/b&gt;&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;p class=&quot;followup-next&quot;&gt;&lt;span&gt;下一步&lt;/span&gt;&lt;strong&gt;${esc(target.next)}&lt;/strong&gt;&lt;/p&gt;
      &lt;div class=&quot;row-actions&quot;&gt;
        &lt;a href=&quot;${target.email ? `mailto:${esc(target.email)}?subject=${esc(encodeURIComponent(emailSubjectFor(target)))}` : esc(target.url)}&quot; ${target.email ? &#x27;&#x27; : &#x27;target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&#x27;}&gt;${target.email ? &#x27;发邮件&#x27; : &#x27;联系页&#x27;}&lt;/a&gt;
        &lt;a href=&quot;${esc(target.url)}&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;来源页&lt;/a&gt;
        &lt;button type=&quot;button&quot; data-followup-key=&quot;${esc(targetKey(target))}&quot;&gt;${esc(primaryAction)}&lt;/button&gt;
      &lt;/div&gt;
    `;
    item.querySelector(&#x27;button&#x27;).addEventListener(&#x27;click&#x27;, event =&gt; {
      const current = targets.find(t =&gt; targetKey(t) === event.currentTarget.dataset.followupKey);
      if (!current) return;
      const currentBucket = followupBucket(current);
      if (currentBucket === &#x27;sent&#x27;) {
        current.status = &#x27;replied&#x27;;
        selectTarget(current);
        persist();
        render();
      } else {
        markTargetSent(current);
      }
    });
    return item;
  }

  function renderDirectory(filtered) {
    const list = root.querySelector(&#x27;#channel-directory-list&#x27;);
    if (!list) return;
    list.replaceChildren();
    const pool = workspaceTargets();
    const dates = availableSourcedDates(pool);
    if (sourcedFilter) {
      const current = sourcedFilter.value;
      sourcedFilter.innerHTML = &#x27;&lt;option value=&quot;all&quot;&gt;全部日期&lt;/option&gt;&#x27; + dates.map(date =&gt; `&lt;option value=&quot;${esc(date)}&quot;&gt;${esc(formatDate(date))}&lt;/option&gt;`).join(&#x27;&#x27;);
      sourcedFilter.value = dates.includes(current) ? current : (current === &#x27;all&#x27; ? &#x27;all&#x27; : dates[0] || &#x27;all&#x27;);
    }
    renderSourcedCalendar(dates);
    const directoryFiltered = pool.filter(target =&gt; matchesFilters(target, {type: activeTypeValue(), region: activeRegionValue(), sourced: activeSourcedValue()})).sort(compareWorkOrder);
    directoryFiltered.forEach(target =&gt; list.appendChild(channelRowFor(target)));
    if (!list.children.length) list.innerHTML = &#x27;&lt;p class=&quot;empty&quot;&gt;当前筛选无推广渠道&lt;/p&gt;&#x27;;
    root.querySelectorAll(&#x27;.summary-chip&#x27;).forEach(chip =&gt; {
      const value = chip.dataset.typeChip;
      chip.classList.toggle(&#x27;active&#x27;, value === activeTypeValue());
      chip.setAttribute(&#x27;aria-pressed&#x27;, String(value === activeTypeValue()));
    });
    root.querySelector(&#x27;#chip-all&#x27;).textContent = pool.length;
    root.querySelector(&#x27;#chip-media&#x27;).textContent = pool.filter(target =&gt; typeKeyFor(target) === &#x27;media&#x27;).length;
    root.querySelector(&#x27;#chip-directory&#x27;).textContent = pool.filter(target =&gt; typeKeyFor(target) === &#x27;directory&#x27;).length;
    root.querySelector(&#x27;#chip-deal&#x27;).textContent = pool.filter(target =&gt; typeKeyFor(target) === &#x27;deal&#x27;).length;
    root.querySelector(&#x27;#chip-aggregator&#x27;).textContent = pool.filter(target =&gt; typeKeyFor(target) === &#x27;aggregator&#x27;).length;
    root.querySelector(&#x27;#chip-direct&#x27;).textContent = pool.filter(target =&gt; typeKeyFor(target) === &#x27;direct&#x27;).length;
    root.querySelectorAll(&#x27;.region-chip&#x27;).forEach(chip =&gt; {
      const value = chip.dataset.regionChip;
      chip.classList.toggle(&#x27;active&#x27;, value === activeRegionValue());
      chip.setAttribute(&#x27;aria-pressed&#x27;, String(value === activeRegionValue()));
    });
    root.querySelector(&#x27;#region-all&#x27;).textContent = pool.length;
    regionOrder.forEach(key =&gt; {
      const element = root.querySelector(`#region-${key}`);
      if (element) element.textContent = pool.filter(target =&gt; regionKeyFor(target) === key).length;
    });
    const typeText = typeLabelFor(activeTypeValue());
    const regionText = regionLabels[activeRegionValue()] || activeRegionValue();
    const sourcedText = activeSourcedValue() === &#x27;all&#x27; ? &#x27;全部日期&#x27; : formatDate(activeSourcedValue());
    root.querySelector(&#x27;#filter-summary-text&#x27;).textContent = `${typeText} · ${regionText} · ${sourcedText}`;
    updateChoiceControls();
  }

  function renderTemplates() {
    const list = root.querySelector(&#x27;#template-list&#x27;);
    const preview = root.querySelector(&#x27;.template-preview&#x27;);
    if (!list) return;
    list.replaceChildren();
    const templateTargets = workspaceTargets()
      .filter(hasEmailTemplate)
      .filter(target =&gt; matchesFilters(target, {type: activeTypeValue(), region: activeRegionValue(), sourced: activeSourcedValue()}))
      .sort(compareWorkOrder);
    templateTargets.forEach(target =&gt; list.appendChild(templateItemFor(target)));
    if (!templateTargets.length) {
      list.innerHTML = &#x27;&lt;p class=&quot;empty&quot;&gt;当前工作区没有邮件模板&lt;/p&gt;&#x27;;
      if (preview) preview.hidden = true;
    } else if (preview &amp;&amp; selected &amp;&amp; hasEmailTemplate(selected)) {
      preview.hidden = false;
    }
  }

  function renderFollowups() {
    const list = root.querySelector(&#x27;#followup-list&#x27;);
    if (!list) return;
    list.replaceChildren();
    const pool = workspaceTargets();
    const counts = {
      todo: pool.filter(target =&gt; followupBucket(target) === &#x27;todo&#x27;).length,
      sent: pool.filter(target =&gt; followupBucket(target) === &#x27;sent&#x27;).length,
      replied: pool.filter(target =&gt; followupBucket(target) === &#x27;replied&#x27;).length,
      all: pool.length
    };
    root.querySelector(&#x27;#followup-todo-count&#x27;).textContent = counts.todo;
    root.querySelector(&#x27;#followup-sent-count&#x27;).textContent = counts.sent;
    root.querySelector(&#x27;#followup-replied-count&#x27;).textContent = counts.replied;
    root.querySelector(&#x27;#followup-all-count&#x27;).textContent = counts.all;
    root.querySelectorAll(&#x27;.followup-tab&#x27;).forEach(tab =&gt; {
      const active = tab.dataset.followupFilter === followupFilter;
      tab.classList.toggle(&#x27;active&#x27;, active);
      tab.setAttribute(&#x27;aria-pressed&#x27;, String(active));
    });
    const ordered = [...pool].sort((a, b) =&gt; {
      const ad = a.followup || &#x27;9999-12-31&#x27;;
      const bd = b.followup || &#x27;9999-12-31&#x27;;
      return ad.localeCompare(bd) || a.name.localeCompare(b.name);
    }).filter(target =&gt; followupFilter === &#x27;all&#x27; || followupBucket(target) === followupFilter);
    ordered.forEach(target =&gt; list.appendChild(followupItemFor(target)));
    if (!list.children.length) list.innerHTML = &#x27;&lt;p class=&quot;empty&quot;&gt;暂无跟进任务&lt;/p&gt;&#x27;;
  }

  function render() {
    const pool = workspaceTargets();
    const filtered = pool.filter(target =&gt; matchesFilters(target)).sort(compareWorkOrder);
    if (selected &amp;&amp; !pool.some(target =&gt; targetKey(target) === targetKey(selected))) selected = filtered[0] || pool[0] || targets[0];
    reachableList.replaceChildren();
    filtered.forEach(t =&gt; reachableList.appendChild(cardFor(t)));
    if (!reachableList.children.length) reachableList.innerHTML = &#x27;&lt;p class=&quot;empty&quot;&gt;当前筛选无渠道&lt;/p&gt;&#x27;;
    root.querySelector(&#x27;#reachable-count&#x27;).textContent = filtered.length;
    root.querySelector(&#x27;#visible-count&#x27;).textContent = `显示 ${filtered.length} / ${pool.length}`;
    root.querySelector(&#x27;#metric-total&#x27;).textContent = pool.length;
    root.querySelector(&#x27;#metric-verified&#x27;).textContent = pool.filter(t =&gt; t.email).length;
    root.querySelector(&#x27;#metric-a&#x27;).textContent = pool.filter(t =&gt; t.priority === &#x27;A&#x27;).length;
    root.querySelector(&#x27;#metric-pending&#x27;).textContent = pool.filter(hasEmailTemplate).length;
    renderOwnerSwitcher();
    renderDirectory(filtered);
    renderTemplates();
    renderFollowups();
    if (selected) selectTarget(selected);
  }

  function showPanel(view) {
    root.querySelectorAll(&#x27;.nav-item&#x27;).forEach(item =&gt; item.classList.toggle(&#x27;active&#x27;, item.dataset.view === view));
    root.querySelectorAll(&#x27;.view-panel&#x27;).forEach(panel =&gt; panel.classList.toggle(&#x27;active&#x27;, panel.dataset.panel === view));
    if (view === &#x27;targets&#x27;) renderDirectory();
    if (view === &#x27;emails&#x27;) renderTemplates();
    if (view === &#x27;followups&#x27;) renderFollowups();
    if (selected) selectTarget(selected);
  }

  [search,priority,status,typeFilter,regionFilter,sourcedFilter].filter(Boolean).forEach(control =&gt; control.addEventListener(control === search ? &#x27;input&#x27; : &#x27;change&#x27;, render));
  sourcedDateToggle?.addEventListener(&#x27;click&#x27;, event =&gt; {
    event.stopPropagation();
    const open = !sourcedDatePicker.classList.contains(&#x27;is-open&#x27;);
    closeChoicePickers();
    if (open &amp;&amp; activeSourcedValue() !== &#x27;all&#x27;) sourcedCalendarMonth = monthDateFromIso(activeSourcedValue());
    setSourcedCalendarOpen(open);
    renderSourcedCalendar();
  });
  root.querySelector(&#x27;#sourced-cal-prev&#x27;)?.addEventListener(&#x27;click&#x27;, event =&gt; {
    event.stopPropagation();
    shiftSourcedCalendarMonth(-1);
  });
  root.querySelector(&#x27;#sourced-cal-next&#x27;)?.addEventListener(&#x27;click&#x27;, event =&gt; {
    event.stopPropagation();
    shiftSourcedCalendarMonth(1);

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {

    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)

    target?.nodeType != null &amp;&amp; trigger.contains(target);

    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;

    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);

              `${Math.max(0, availableHeight)}px`,

      .then(({ x, y }) =&gt; {

      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {

        }

  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;

      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger

      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
